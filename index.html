<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <!-- Header Section  -->
    <header>
        <div class="mainheading">
            <h2>Weather</h2>
        </div>
        <div class="subHeading"> 
            <p class="TimeAndDate">
                <span>12:14</span> .
                <span>Sun</span>,
                <span>Mar 1</span>
            </p>
        </div>
    </header>
    <!-- Search Bar Section  -->
    <section class="searchBarSection">
        <div class="searchBar">
            <form action="">
                <input type="text" name="cityName" class="cityName">
                <button class="searchBtn" type="submit">Go</button>
            </form>
        </div>
        <div class="locationSearch">
            <button class="myLocationBtn">+ My Location</button>
        </div>
    </section>
    
</body>
</html>
