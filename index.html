<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section  -->
    <header>
        <div class="mainHeading">
            <h2>Weather</h2>
        </div>
        <div class="subHeading"> 
            <p class="timeAndDate">
                <span>-</span> .
                <span>-</span>,
                <span>-</span>
            </p>
        </div>
    </header>
    <!-- Search Bar Section  -->
    <section class="searchBarSection">
        <div class="searchBar">
            <form action="">
                <input type="text" name="cityName" class="cityName">
                <button class="searchBtn" type="submit">Go</button>
            </form>
        </div>
        <div class="locationSearch">
            <button class="myLocationBtn">+ My Location</button>
        </div>
    </section>
    <!-- Weather Display Section -->
     <section class="weatherSection">
        <div class="weatherTempContainer">
            <h1 class="temperature">-</h1>
            <p class="weatherCity">-</p>
            <p class="weatherClimate">
                <span class="climateImgContainer">
                    <img src="./public/clear sky.png" alt="" height="22px" class="climateImg">
                    &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;  
                    <span class="climateDescription">-</span>
                </span>
                <span class="weatherDate"> -</span>
            </p>
        </div>
        <div class="weatherFeatureContainer">
            <div class="tempToggle">
                <button class="celcius">°C</button>
                <button class="fahernheit">°F</button>
            </div>
            <div class="extraFeature">
                <div class="weatherHumdity">
                    💧 <span class="humidityVal">-</span>
                </div>
                <div class="weatherWindSpeed">
                    💨
                    <span class="windSpeedVal">-</span>
                </div>
                <div class="weatherVisibility">
                    👁 
                   <span class="visibilityVal">-</span>
                </div>
            </div>
        </div>
     </section>
     <script src="script.js"></script>
</body>
</html>
