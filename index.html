<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <!-- Header Section  -->
    <header>
        <div class="mainheading">
            <h2>Weather</h2>
        </div>
        <div class="subHeading"> 
            <p class="TimeAndDate">
                <span>12:14</span> .
                <span>Sun</span>,
                <span>Mar 1</span>
            </p>
        </div>
    </header>
    <!-- Search Bar Section  -->
    <section class="searchBarSection">
        <div class="searchBar">
            <form action="">
                <input type="text" name="cityName" class="cityName">
                <button class="searchBtn" type="submit">Go</button>
            </form>
        </div>
        <div class="locationSearch">
            <button class="myLocationBtn">+ My Location</button>
        </div>
    </section>
    <!-- Weather Display Section -->
     <section class="weatherSection">
        <div class="weatherTempContainer">
            <h1 class="temperature">31.7 C</h1>
            <p class="weatherCity">Delhi, India</p>
            <p class="weatherClimate">
                <span class="climateImg">
                    <img src="./public/clear sky.png" alt="" height="25px">
                    Clear sky
                </span>
                <span class="weatherDate"> Sunday, March 1</span>
            </p>
        </div>
        <div class="weatherFeatureContainer">
            <div class="tempToggle">
                <span class="celcius">C</span>
                <span class="fahernheit">F</span>
            </div>
            <div class="extraFeature">
                <span class="weatherHumdity">
                    <img src="./public/humidity.png" alt="" height="25px">
                    9%
                </span>
                <span class="weatherWindSpeed">
                    <img src="./public/wind.png" alt="" height="25px">
                    20.7 Km/h
                </span>
                <span class="weatherVisibility">
                    <img src="./public/rain.png" alt="" height="25px">
                    10.0km
                </span>
            </div>
        </div>
     </section>
</body>
</html>
